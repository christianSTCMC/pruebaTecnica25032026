services:
  mysql:
    image: mysql:8.4
    container_name: api-franquicias-mysql
    environment:
      MYSQL_DATABASE: franquicias
      MYSQL_USER: franquicias_user
      MYSQL_PASSWORD: franquicias_pass
      MYSQL_ROOT_PASSWORD: franquicias_root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
