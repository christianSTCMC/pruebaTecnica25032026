spring:
  datasource:
    url: jdbc:h2:mem:franquicias_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password: ''
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        type:
          preferred_uuid_jdbc_type: CHAR
  flyway:
    enabled: false
